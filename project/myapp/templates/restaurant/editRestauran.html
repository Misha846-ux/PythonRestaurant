{% extends 'restaurant/layout.html' %}
{% load static %}

{% block content %}

<div class="container mt-4">

    <h2>Изменить ресторан</h2>

    <form id="restaurantForm">

        <div class="mb-3">

            <label class="form-label">
                Название
            </label>

            <input
                type="text"
                class="form-control"
                id="name"
                value="{{ restauran.name }}"
            >

        </div>

        <div class="mb-3">

            <label class="form-label">
                Типы ресторана
            </label>

            <select
                multiple
                class="form-select"
                id="restaurantTypes">

                {% for rType in rTypes %}

                <option
                    value="{{ rType.id }}"
                    {% if rType in restauran.restauranType.all %}
                        selected
                    {% endif %}
                >
                    {{ rType.typeName }}
                </option>

                {% endfor %}

            </select>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Адрес
            </label>

            <input
                type="text"
                class="form-control"
                id="adress"
                value="{{ restauran.adress }}"
            >

        </div>

        <div class="mb-3">

            <label class="form-label">
                Телефон
            </label>

            <input
                type="text"
                class="form-control"
                id="phoneNumber"
                value="{{ restauran.phoneNumber }}"
            >

        </div>

        <div class="mb-3">

            <label class="form-label">
                Сайт
            </label>

            <input
                type="url"
                class="form-control"
                id="website"
                value="{{ restauran.website }}"
            >

        </div>

        <button
            type="submit"
            class="btn btn-success"
        >
            Сохранить
        </button>

    </form>

</div>

<script src="{% static 'myapp/restaurant/editRestauran.js' %}"></script>

{% endblock %}
